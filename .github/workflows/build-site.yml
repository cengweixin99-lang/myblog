name: Build Static Site

on:
  workflow_dispatch:
  issues:
    types: [opened, edited, reopened, labeled, unlabeled, closed, deleted]
  issue_comment:
    types: [created, edited, deleted]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_OWNER: ${{ github.repository_owner }}
      GITHUB_REPO: ${{ github.event.repository.name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install build dependencies
        run: pnpm install

      - name: Fetch issues into site content
        run: pnpm run fetch:issues

      - name: Setup Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola

      - name: Clean previous Zola output
        run: rm -rf public
        working-directory: site

      - name: Build site
        run: zola build --base-url https://cengweixin99-lang.github.io/myblog
        working-directory: site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
